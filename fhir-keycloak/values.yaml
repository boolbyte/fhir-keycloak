# Default values for fhir-keycloak (Keycloak + SMART on FHIR).
# Declare variables to be passed into your templates.

replicaCount: 1

# Container image: use the image built and pushed by this repo's CI (e.g. ghcr.io/owner/fhir-keycloak).
image:
  repository: ghcr.io/your-org/fhir-keycloak
  pullPolicy: IfNotPresent
  tag: "latest"

# Optional env vars for Keycloak (e.g. KC_DB, KC_HOSTNAME, KC_HTTP_PORT). Merged with any extraEnv.
keycloak:
  env: {}
  # Example for production with PostgreSQL:
  # env:
  #   KC_DB: postgres
  #   KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
  #   KC_DB_USERNAME: keycloak
  #   KC_DB_PASSWORD: changeme
  #   KC_HOSTNAME: auth.example.com
  #   KC_PROXY: edge

# keycloak-config: Job that runs the configurator (same image as Keycloak) to create/update the realm.
# KEYCLOAK_BASE_URL defaults to the Keycloak service in this release (http://<release>-fhir-keycloak:8080).
keycloakConfig:
  enabled: true
  # Env for the configurator; defaults are set in the Job template (Keycloak service URL, admin from keycloak.env if set).
  env: {}
  # Example overrides (optional):
  # env:
  #   KEYCLOAK_REALM: myrealm
  #   KEYCLOAK_USER: admin
  #   KEYCLOAK_PASSWORD: changeme
  #   FHIR_BASE_URL: https://fhir.example.com/api/v4

imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # Keycloak HTTP port (default 8080)
  port: 8080

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Keycloak typically needs at least 512Mi memory; adjust for your workload.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Keycloak health endpoints (see https://www.keycloak.org/server/configuration-health)
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional env vars for the Keycloak container (list of { name, value } or { name, valueFrom }).
extraEnv: []

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
